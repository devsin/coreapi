version: "2"
sql:
- engine: "postgresql"
  schema: "db/migrations"
  queries: "db/queries"
  gen:
    go:
      package: "dbgen"
      out: "gen/db"
      sql_package: "pgx/v5"
      emit_json_tags: true
      emit_interface: false
      emit_prepared_queries: false
      emit_exact_table_names: false
      json_tags_case_style: camel
      emit_pointers_for_null_types: true
      overrides:
      - db_type: "uuid"
        go_type: "github.com/google/uuid.UUID"
      - db_type: "timestamptz"
        go_type: "time.Time"
